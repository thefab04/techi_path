name: TechQuest CI Pipeline   # Name shown in GitHub Actions tab

on:
  push:
    branches: [ "feature-new" ]      # Runs when code is pushed to main
  pull_request:
    branches: [ "feature-new" ]      # Runs on PRs too

jobs:
  build:
    runs-on: ubuntu-latest    # GitHub creates a temporary Linux machine

    steps:

    # 1️⃣ Download your repository code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Setup Docker Buildx (advanced builder)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3️⃣ Build Backend Docker Image
    - name: Build Backend Image
      run: |
        docker build -t techquest-backend ./project/backend

    # 4️⃣ Build Frontend Docker Image
    - name: Build Frontend Image
      run: |
        docker build -t techquest-frontend ./project

    # 5️⃣ Verify images built successfully
    - name: List Docker Images
      run: docker image ls
      
    - name: Scan Backend Image with Trivy
      uses: aquasecurity/trivy-action@master
      with: 
        image-ref: techquest-backend:latest
        format: table
        exit-code: 0
        ignore-unfixed: true
        severity: CRITICAL,HIGH
        # Add this line below
        skip-dirs: /app/node_modules 
        vuln-type: 'os,library'

    - name: Scan Frontend Image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: techquest-frontend:latest
        format: table
        exit-code: 0
        ignore-unfixed: true  
        severity: CRITICAL,HIGH
        # Add this line below
        skip-dirs: /app/node_modules
        vuln-type: 'os,library'
